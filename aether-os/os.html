<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="boot-screen" class="screen operational-state">
        <div class="boot-container">
            <div class="logo">Æ</div>
            <div class="spinner"></div>
            <p id="boot-status">Initializing Core Modules...</p>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="avatar"></div>
            <h2>Aether User</h2>
            <form id="login-form">
                <input type="password" id="password-input" placeholder="Password (Press Enter)" autofocus>
                <button type="submit">Sign In</button>
            </form>
            <p id="login-error">Incorrect password. Hint: just press Enter or type anything!</p>
        </div>
    </div>

    <div id="desktop-screen" class="screen">
        <div class="desktop-icons">
            <div class="icon" onclick="alert('System Storage is optimal.')">
                <div class="icon-img">📁</div>
                <span>My Files</span>
            </div>
        </div>

        <div class="taskbar">
            <button class="start-btn" id="start-menu-trigger">⚡ Start</button>
            <div class="running-apps">
                <div class="active-tab">System Console</div>
            </div>
            <div class="system-tray" id="live-clock">00:00 PM</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
