<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nythera Labs // Hub</title>
    <style>
        :root[data-theme="dark"] {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #1f6feb;
        }

        :root[data-theme="light"] {
            --bg-color: #f6f8fa;
            --panel-bg: #ffffff;
            --border-color: #d0d7de;
            --text-main: #24292f;
            --text-muted: #57606a;
            --accent: #0969da;
            --accent-hover: #0c87eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--accent);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            background-color: var(--panel-bg);
            transition: border-color 0.2s, background-color 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .main-showcase {
            display: block;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .card .action-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-top: auto;
        }

        footer {
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Nythera <span>Labs</span></h1>
            <button class="theme-toggle" id="themeBtn">Toggle Theme</button>
        </header>

        <main class="main-showcase">
            <a href="tools/game.html" class="card">
                <div>
                    <h3>Cyber-Dash 3D Arena</h3>
                    <p>High-performance vector-movement physics simulation engine. Strike through hostile units using active dash mechanics to clear cache registries entirely inside a 3D canvas environment.</p>
                </div>
                <div class="action-text">Launch Simulation Arena →</div>
            </a>
        </main>

        <footer>
            &copy; 2026 Nythera Labs. All systems operational.
        </footer>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        const htmlDoc = document.documentElement;

        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlDoc.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlDoc.setAttribute('data-theme', newTheme);
        });
    </script>
</body>
</html>
