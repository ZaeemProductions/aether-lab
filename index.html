<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #0f172a, #000000); color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
    .tool-chip { transition: all 0.2s ease; }
    .tool-chip:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
  </style>
</head>
<body class="h-screen flex flex-col relative">

  <div id="canvas-container"></div>

  <header class="p-6 flex justify-between items-center z-10">
    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 tracking-wider">Aether Lab</h1>
    <div id="auth-container">
      <button id="login-btn" class="glass px-6 py-2 hover:bg-white/10 transition">Sign in with Google</button>
      <div id="user-info" class="hidden flex items-center gap-3 glass px-4 py-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full" src="" alt="Avatar">
        <span id="user-name" class="font-medium text-sm"></span>
        <button id="logout-btn" class="text-xs text-red-400 ml-2 hover:text-red-300">Exit</button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center p-6 z-10 w-full max-w-5xl mx-auto">
    
    <div class="glass w-full p-4 mb-8 flex flex-wrap justify-center gap-3">
      <button class="tool-chip px-4 py-2 rounded-full border border-white/20 text-sm font-medium">🤖 AI Chat</button>
      <button class="tool-chip px-4 py-2 rounded-full border border-white/20 text-sm font-medium">🤖 Image Gen</button>
      <button class="tool-chip px-4 py-2 rounded-full border border-white/20 text-sm font-medium">🛠️ QR Code</button>
      <button class="tool-chip px-4 py-2 rounded-full border border-white/20 text-sm font-medium">🔐 Cipher Kit</button>
      <button class="tool-chip px-4 py-2 rounded-full border border-white/20 text-sm font-medium">💻 HTML Forge</button>
    </div>

    <div class="glass w-full h-[50vh] flex items-center justify-center relative shadow-2xl">
      <p class="text-white/50 text-lg">Select a tool to begin...</p>
    </div>
  </main>

  <footer class="glass m-4 p-4 z-10 max-h-32 overflow-y-auto">
    <h3 class="text-xs text-purple-400 font-bold uppercase tracking-widest mb-2">Live Activity</h3>
    <ul id="activity-feed" class="text-sm text-white/70 space-y-1">
      <li>System initialized. Awaiting cosmic input...</li>
    </ul>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // Your exact keys from the console
    const firebaseConfig = {
      apiKey: "AIzaSyAk_rARkhkZGriWHMWkD6vRGhd82Ko32wM",
      authDomain: "aether-lab.firebaseapp.com",
      databaseURL: "https://aether-lab-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aether-lab",
      storageBucket: "aether-lab.firebasestorage.app",
      messagingSenderId: "1044048980464",
      appId: "1:1044048980464:web:f44f00902acf6c4ccc5535",
      measurementId: "G-H0L7P4LY83"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // DOM Elements
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');
    const userName = document.getElementById('user-name');
    const userAvatar = document.getElementById('user-avatar');
    const activityFeed = document.getElementById('activity-feed');

    // Auth Logic
    const provider = new GoogleAuthProvider();
    
    loginBtn.onclick = () => signInWithPopup(auth, provider).catch(console.error);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginBtn.classList.add('hidden');
        userInfo.classList.remove('hidden');
        userName.textContent = user.displayName;
        userAvatar.src = user.photoURL;
        logActivity(`${user.displayName} connected to Aether Lab.`);
      } else {
        loginBtn.classList.remove('hidden');
        userInfo.classList.add('hidden');
      }
    });

    // Database Logic (Live Feed)
    const feedRef = ref(db, 'activity');
    
    function logActivity(message) {
      push(feedRef, { text: message, timestamp: serverTimestamp() });
    }

    onChildAdded(feedRef, (data) => {
      const li = document.createElement('li');
      li.textContent = `> ${data.val().text}`;
      activityFeed.prepend(li);
    });
  </script>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const geometry = new THREE.TorusGeometry(10, 0.5, 16, 100);
    const material = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, wireframe: true, transparent: true, opacity: 0.3 });
    const torus = new THREE.Mesh(geometry, material);
    
    scene.add(torus);
    camera.position.z = 25;

    function animate() {
      requestAnimationFrame(animate);
      torus.rotation.x += 0.001;
      torus.rotation.y += 0.002;
      renderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
