<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Lab // Pure Client</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #0f172a, #000000); color: #fff; font-family: system-ui, sans-serif; }
    #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
    .tool-tab { display: none !important; }
    .tool-tab.flex { display: flex !important; }
  </style>
</head>
<body class="h-screen flex flex-col p-4">

  <div id="canvas-container"></div>

  <nav class="glass p-4 mb-4 flex gap-3 justify-center z-10 flex-wrap">
    <button onclick="openTool('chat')" class="px-4 py-2 rounded-full border border-blue-500/30 text-blue-300 text-sm font-bold hover:bg-blue-500/20">🤖 AI Core</button>
    <button onclick="openTool('image')" class="px-4 py-2 rounded-full border border-purple-500/30 text-purple-300 text-sm font-bold hover:bg-purple-500/20">🖼️ Dream</button>
    <button onclick="openTool('vault')" class="px-4 py-2 rounded-full border border-indigo-500/30 text-indigo-300 text-sm font-bold hover:bg-indigo-500/20">💾 Vault</button>
  </nav>

  <div class="glass flex-1 p-6 relative z-10" id="tool-container">
    <div id="default-view" class="h-full flex items-center justify-center text-white/50">System Offline. Select module.</div>
    
    <div id="tool-chat" class="tool-tab flex-col h-full">
        <h2 class="text-blue-400 font-bold mb-2">AI Logic</h2>
        <div id="chat-out" class="flex-1 bg-black/40 p-4 mb-2 rounded font-mono text-sm"></div>
        <input type="text" id="chat-in" class="bg-black/60 p-2 text-white border border-white/10" placeholder="Prompt...">
    </div>

    <div id="tool-image" class="tool-tab flex-col h-full">
        <h2 class="text-purple-400 font-bold mb-2">Dream Weaver</h2>
        <input type="text" id="img-in" class="bg-black/60 p-2 text-white border border-white/10" placeholder="Image prompt...">
        <button onclick="genImg()" class="bg-purple-600 px-4 py-2 mt-2 rounded">Synthesize</button>
        <img id="img-out" class="mt-4 max-h-64 object-contain">
    </div>

    <div id="tool-vault" class="tool-tab flex-col h-full">
        <h2 class="text-indigo-400 font-bold mb-2">Local Vault</h2>
        <textarea id="vault-in" oninput="saveVault()" class="flex-1 bg-black/40 p-4 text-indigo-100 font-mono"></textarea>
    </div>
  </div>

  <script>
    function openTool(name) {
      document.getElementById('default-view').style.display = 'none';
      document.querySelectorAll('.tool-tab').forEach(el => el.classList.remove('flex'));
      document.getElementById('tool-' + name).classList.add('flex');
    }

    // AI Logic (Client-side fetch to public API)
    async function sendChat() {
        const i = document.getElementById('chat-in');
        const o = document.getElementById('chat-out');
        const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(i.value)}`);
        o.innerText = await res.text();
    }

    // Image Logic (Client-side)
    function genImg() {
        const i = document.getElementById('img-in').value;
        document.getElementById('img-out').src = `https://image.pollinations.ai/prompt/${encodeURIComponent(i)}`;
    }

    // Vault Logic (Local Browser Storage)
    function saveVault() { localStorage.setItem('vault', document.getElementById('vault-in').value); }
    window.onload = () => document.getElementById('vault-in').value = localStorage.getItem('vault') || '';
  </script>
</body>
</html>
