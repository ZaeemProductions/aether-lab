<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zaeem Labs // Meadow Dash</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #8be39b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Chill Initializer Menu */
        #boot-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a6f0ff 0%, #b2fce3 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1b5231;
            text-align: center;
        }
        .boot-btn {
            margin-top: 25px;
            padding: 16px 50px;
            background: linear-gradient(135deg, #3cb063 0%, #1c6634 100%);
            border: 2px solid #ffffff;
            color: #ffffff;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(28, 102, 52, 0.25);
            letter-spacing: 1px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        .hud-element {
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #3cb063;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            padding: 12px 25px;
            border-radius: 20px;
            color: #1b5231;
            backdrop-filter: blur(8px);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-family: monospace;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #stat-hp { color: #ff3366; }
        #stat-score { color: #1c6634; }
        
        /* Full-Screen Splitting Tracking Pads Indicators */
        #dynamic-joystick-pointer {
            position: absolute;
            width: 85px;
            height: 85px;
            border: 3px dashed rgba(60, 176, 99, 0.6);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 20;
            display: none;
            transform: translate(-50%, -50%);
        }
        #dynamic-joystick-thumb {
            position: absolute;
            width: 38px;
            height: 38px;
            background: radial-gradient(circle, #83ffb3 0%, #1c6634 100%);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #controls-layer {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            width: 100%;
            height: 100%;
            padding-bottom: 15px;
            pointer-events: none;
        }
        .touch-zone { pointer-events: auto; }
        
        #dash-btn {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #ff7ebb 0%, #e60067 100%);
            border: 3px solid #ffffff;
            color: #ffffff;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 20px rgba(230, 0, 103, 0.3);
        }
    </style>
</head>
<body>

    <div id="boot-overlay">
        <h1 style="font-size: 2.5rem; color: #1b5231; font-weight: 900; letter-spacing: 1px;">MEADOW DASH</h1>
        <p style="color: #48825b; margin-top: 8px; font-weight: 600; font-family: monospace;">Full Left-Screen Move • Lo-Fi Music Matrix</p>
        <button class="boot-btn" onclick="bootDarkCoreEngine()">INITIALIZE MAIN</button>
    </div>

    <div id="dynamic-joystick-pointer">
        <div id="dynamic-joystick-thumb"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element">VIBE STATUS: <span id="stat-hp">GOOD</span></div>
            <div class="hud-element">SMILES FREED: <span id="stat-score">0</span></div>
        </div>

        <div id="controls-layer">
            <button id="dash-btn" class="touch-zone">DASH</button>
        </div>
    </div>

    <script>
        // --- COOL PROCEDURAL LO-FI CHILL MUSIC SEQUENCER ---
        class SynthAudioEngine {
            constructor() { this.ctx = null; this.musicInterval = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.startRelaxingLoop();
            }
            playChime() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // High C harmonic spark
                osc.frequency.exponentialRampToValueAtTime(1100, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.11);
            }
            playDashSweep() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(660, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.16);
            }
            playPop() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(880, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.16);
            }
            startRelaxingLoop() {
                let progressions = [
                    [60, 64, 67, 71], // C Maj7
                    [65, 69, 72, 76], // F Maj7
                    [62, 65, 69, 72], // D Min7
                    [67, 71, 74, 77]  // G 7
                ];
                let progIdx = 0, noteIdx = 0;
                this.musicInterval = setInterval(() => {
                    if (!this.ctx || !gameActive) return;
                    let chord = progressions[progIdx];
                    let midiNote = chord[noteIdx % chord.length];
                    let freq = 440 * Math.pow(2, (midiNote - 69) / 12);
                    
                    let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.03, this.ctx.currentTime); // Soft, completely non-intrusive volume
                    gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.41);
                    
                    noteIdx++;
                    if(noteIdx % 4 === 0) progIdx = (progIdx + 1) % progressions.length;
                }, 280); // Smooth lo-fi walking tempo rhythm
            }
        }

        const audio = new SynthAudioEngine();

        function bootDarkCoreEngine() {
            document.getElementById('boot-overlay').style.display = 'none';
            audio.init();
            launchEngineCircuit();
        }

        // --- 2D ENGINE MATRIX CONFIGS ---
        let canvas, ctx;
        let lastTime = performance.now();
        let gameActive = true;
        let score = 0;

        // Massive Open Field Arena dimensions boundary parameters
        const worldW = 2500;
        const worldH = 2500;

        let player = {
            x: 1250, y: 1250,
            vx: 0, vy: 0,
            radius: 20,
            angle: 0,
            speedScale: 6.5,
            friction: 0.88,
            dashTimer: 0,
            walkAnimate: 0
        };

        let entities = [];
        let particles = [];
        let clouds = [];

        // Camera positioning coordinates container
        let camera = { x: 1250, y: 1250 };

        // Split touch interface definitions
        let moveTouchId = null;
        let joyActive = false;
        let joyOrigin = { x: 0, y: 0 };
        let joyVector = { x: 0, y: 0 };
        const maxJoyDist = 55;

        function launchEngineCircuit() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            resizeViewport();

            window.addEventListener('resize', resizeViewport);
            setupTouchInputOverrides();

            // Populate persistent world environmental items
            for(let i=0; i<35; i++) spawnWorldSceneryElement();
            for(let i=0; i<20; i++) spawnHappyTargetNode();
            for(let i=0; i<8; i++) spawnCloudMatrix();

            requestAnimationFrame(engineMainLoop);
        }

        function resizeViewport() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnWorldSceneryElement() {
            entities.push({
                x: Math.random() * (worldW - 100) + 50,
                y: Math.random() * (worldH - 100) + 50,
                type: 'scenery',
                emoji: ['🌲', '🌳', '🌻', '🌸', '🌼'][Math.floor(Math.random() * 5)],
                bobSeed: Math.random() * 5
            });
        }

        function spawnHappyTargetNode() {
            entities.push({
                x: Math.random() * (worldW - 100) + 50,
                y: Math.random() * (worldH - 100) + 50,
                type: 'target',
                emoji: ['🙂', '🙃', '🍬', '💎'][Math.floor(Math.random() * 4)],
                bobSeed: Math.random() * 10,
                alive: true
            });
        }

        function spawnCloudMatrix() {
            clouds.push({
                x: Math.random() * worldW,
                y: Math.random() * (worldH * 0.4),
                speed: 10 + Math.random() * 15,
                scale: 0.6 + Math.random() * 0.6
            });
        }

        function setupTouchInputOverrides() {
            const dashBtn = document.getElementById('dash-btn');
            const joyPointer = document.getElementById('dynamic-joystick-pointer');
            const joyThumb = document.getElementById('dynamic-joystick-thumb');

            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    // If finger hits left side of screen anywhere -> create dynamic move ring parameters
                    if (touch.clientX < window.innerWidth / 2 && moveTouchId === null) {
                        if (touch.target.tagName === 'BUTTON') continue;
                        moveTouchId = touch.identifier;
                        joyActive = true;
                        joyOrigin.x = touch.clientX;
                        joyOrigin.y = touch.clientY;
                        
                        joyPointer.style.left = `${joyOrigin.x}px`;
                        joyPointer.style.top = `${joyOrigin.y}px`;
                        joyPointer.style.display = 'block';
                        joyThumb.style.transform = 'translate(-50%, -50%)';
                    }
                }
            }, {passive: true});

            window.addEventListener('touchmove', (e) => {
                if (joyActive) e.preventDefault();

                if (joyActive && moveTouchId !== null) {
                    let activeTouch = null;
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === moveTouchId) activeTouch = e.touches[i];
                    }
                    if (activeTouch) {
                        let dx = activeTouch.clientX - joyOrigin.x;
                        let dy = activeTouch.clientY - joyOrigin.y;
                        let dist = Math.hypot(dx, dy);
                        
                        if (dist > maxJoyDist) {
                            dx = (dx / dist) * maxJoyDist;
                            dy = (dy / dist) * maxJoyDist;
                        }
                        
                        joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        
                        joyVector.x = dx / maxJoyDist;
                        joyVector.y = dy / maxJoyDist;
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if (touch.identifier === moveTouchId) {
                        moveTouchId = null;
                        joyActive = false;
                        joyPointer.style.display = 'none';
                        joyVector.x = 0;
                        joyVector.y = 0;
                    }
                }
            });

            dashBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerKineticPlayerDash();
            });

            // Keyboard backups split paths
            window.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Spacebar') triggerKineticPlayerDash();
                if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') joyVector.y = -1;
                if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') joyVector.y = 1;
                if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') joyVector.x = -1;
                if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') joyVector.x = 1;
            });
            window.addEventListener('keyup', (e) => {
                if (['w', 's', 'ArrowUp', 'ArrowDown'].includes(e.key)) joyVector.y = 0;
                if (['a', 'd', 'ArrowLeft', 'ArrowRight'].includes(e.key)) joyVector.x = 0;
            });
        }

        function triggerKineticPlayerDash() {
            if (!gameActive || player.dashTimer > 0) return;
            
            // Calculate direction vector metrics
            let moveLen = Math.hypot(joyVector.x, joyVector.y);
            let dashMoveX = moveLen > 0 ? (joyVector.x / moveLen) : Math.cos(player.angle);
            let dashMoveY = moveLen > 0 ? (joyVector.y / moveLen) : Math.sin(player.angle);
            
            player.vx += dashMoveX * 28;
            player.vy += dashMoveY * 28;
            player.dashTimer = 0.45; // Cooldown clock parameter register
            
            audio.playDashSweep();

            // Spawn bright flower trail sparks arrays
            for(let i=0; i<12; i++) {
                particles.push({
                    x: player.x, y: player.y,
                    vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    color: ['#ffeb3b', '#ff4081', '#00e676'][Math.floor(Math.random()*3)],
                    life: 1.0, size: 4 + Math.random()*5
                });
            }
        }

        function engineMainLoop(timestamp) {
            requestAnimationFrame(engineMainLoop);
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1;

            if (gameActive) {
                if (player.dashTimer > 0) player.dashTimer -= dt;

                // Apply continuous smooth drift friction dampening arrays
                player.vx *= player.friction;
                player.vy *= player.friction;

                // Push dynamic thrust vectors from input tracking registers
                player.vx += joyVector.x * player.speedScale * 0.45;
                player.vy += joyVector.y * player.speedScale * 0.45;

                player.x += player.vx;
                player.y += player.vy;

                // Handle walk rotation metrics math
                if (Math.hypot(player.vx, player.vy) > 0.3) {
                    player.angle = Math.atan2(player.vy, player.vx);
                    player.walkAnimate += dt * 14;
                }

                // Keep player securely clamped within map boundaries
                player.x = Math.max(player.radius, Math.min(worldW - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(worldH - player.radius, player.y));

                // Linear interpolation tracking camera setup loop
                camera.x += (player.x - camera.x) * 0.08;
                camera.y += (player.y - camera.y) * 0.08;

                // Float clouds coordinates naturally across meadow grid quadrants
                clouds.forEach(c => {
                    c.x += c.speed * dt;
                    if(c.x > worldW + 100) c.x = -150;
                });

                // Evaluate collision collections checks
                entities.forEach(ent => {
                    if (ent.type === 'target' && ent.alive) {
                        let dist = Math.hypot(player.x - ent.x, player.y - ent.y);
                        if (dist < player.radius + 22) {
                            ent.alive = false;
                            score++;
                            document.getElementById('stat-score').innerText = score;
                            audio.playChime();

                            // Burst pop decorative sparkle grids
                            for(let p=0; p<10; p++) {
                                particles.push({
                                    x: ent.x, y: ent.y,
                                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
                                    color: '#ffffff', life: 1.0, size: 3 + Math.random() * 4
                                });
                            }

                            // Respawn node array elements coordinates securely instantly
                            setTimeout(() => {
                                entities = entities.filter(e => e !== ent);
                                spawnHappyTargetNode();
                            }, 1000);
                        }
                    }
                });

                // Decay decorative particle timelines array logs
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= dt * 2.2;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            renderGraphicsCircuit();
        }

        function renderGraphicsCircuit() {
            ctx.fillStyle = '#66cc80'; // Lush, high visibility beautiful green lawn surface tint
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Translate rendering view relative directly to camera layout matrices context
            ctx.translate(canvas.width / 2 - camera.x, canvas.height / 2 - camera.y);

            // Draw a neat clean soft tile pattern for speed velocity perspective scaling indicators
            ctx.fillStyle = '#5cb876';
            let tileSize = 120;
            let startX = Math.floor((camera.x - canvas.width) / tileSize) * tileSize;
            let endX = Math.ceil((camera.x + canvas.width) / tileSize) * tileSize;
            let startY = Math.floor((camera.y - canvas.height) / tileSize) * tileSize;
            let endY = Math.ceil((camera.y + canvas.height) / tileSize) * tileSize;

            for (let tx = startX; tx < endX; tx += tileSize) {
                for (let ty = startY; ty < endY; ty += tileSize) {
                    if ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 2 === 0) {
                        ctx.fillRect(tx, ty, tileSize, tileSize);
                    }
                }
            }

            // Outer boundary map frame limits line art accents
            ctx.strokeStyle = '#ff4081'; ctx.lineWidth = 6;
            ctx.strokeRect(0, 0, worldW, worldH);

            // Sort rendering queues naturally relative to Y coordinate indices depth layers checks
            let renderQueue = [...entities];
            renderQueue.sort((a, b) => a.y - b.y);

            // Draw all environmental scenery, flowers and active target smile metrics
            renderQueue.forEach(ent => {
                ctx.save();
                let scaleBob = Math.sin(performance.now() * 0.005 + ent.bobSeed) * 3;
                ctx.font = ent.type === 'scenery' ? '36px Arial' : '32px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                
                if (ent.type === 'target') {
                    if (ent.alive) {
                        ctx.fillText(ent.emoji, ent.x, ent.y + scaleBob);
                    } else {
                        ctx.fillText('💥', ent.x, ent.y);
                    }
                } else {
                    ctx.fillText(ent.emoji, ent.x, ent.y + scaleBob);
                }
                ctx.restore();
            });

            // Draw floating cloud panels overhead shadows
            clouds.forEach(c => {
                ctx.save();
                ctx.font = `${45 * c.scale}px Arial`;
                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.fillText('☁️', c.x, c.y);
                ctx.restore();
            });

            // Draw sparkling trace trailing lines particles matrices array profiles
            particles.forEach(p => {
                ctx.save();
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // --- DRAW CUTE 2D PLAYER AVATAR METRIC CONTEXT ---
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            // Draw swinging cartoon running legs animation
            let leftLegOffset = Math.sin(player.walkAnimate) * 12;
            let rightLegOffset = Math.cos(player.walkAnimate) * 12;
            ctx.fillStyle = '#1b5231';
            if(Math.hypot(player.vx, player.vy) > 0.5) {
                ctx.fillRect(-6, -18 + leftLegOffset, 5, 8);
                ctx.fillRect(-6, 10 + rightLegOffset, 5, 8);
            }

            // Draw clean main body character orb
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#1b5231'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            // Draw adorable face eyes looking toward orientation direction vectors
            ctx.fillStyle = '#1b5231';
            ctx.beginPath(); ctx.arc(8, -6, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(8, 6, 3, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
            ctx.restore();
        }

        function onWindowResize() { resizeViewport(); }
    </script>
</body>
</html>
