<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Runner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI Overlay */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .score-card { background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 1.2rem; color: #1a5c2e; align-self: flex-start; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Game States Overlays */
        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); color: white; text-align: center; padding: 20px; transition: opacity 0.3s ease; }
        .screen-overlay.hidden { opacity: 0; pointer-events: none; }
        #loading-screen { background: #111; z-index: 30; }
        
        h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { font-size: 1.1rem; margin-bottom: 20px; color: #ccc; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; pointer-events: auto; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); transform: translateY(0); transition: all 0.1s ease; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(76, 175, 80, 0.4); }
        
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #4CAF50; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="score-card">DISTANCE: <span id="score-val">0</span>m</div>
    </div>

    <div id="loading-screen" class="screen-overlay">
        <div class="spinner"></div>
        <h1>LOADING CORE ASSETS</h1>
        <p>Optimizing environment textures and structures...</p>
    </div>

    <div id="crash-screen" class="screen-overlay hidden">
        <h1 style="color: #ff4a4a;">CRASHED!</h1>
        <p>You ran into a security matrix barrier.</p>
        <p>Distance Survived: <span id="final-score">0</span> meters</p>
        <button id="retry-btn">RUN AGAIN</button>
    </div>

    <script>
        // --- GAME CONFIGURATION ---
        const CONFIG = {
            lanes: [-2.5, 0, 2.5], // X positions for left, center, right lanes
            laneSpeed: 15,         // Lateral switching speed interpolation
            baseSpeed: 25,         // Initial forward engine velocity
            speedIncrement: 0.5,   // Acceleration rate per 100 meters
            spawnInterval: 1.5,    // Obstacle structural generation cadence (seconds)
            obstacleSpeed: 0,      // Static obstacles relative to world frame
            playerZ: 0             // Fixed anchor axis for player engine
        };

        // --- STATE MANAGEMENT ---
        let scene, camera, renderer, clock;
        let player = null;
        let obstacles = [];
        let tracks = [];
        
        let currentLane = 1;       // Start in center lane (Index 1)
        let targetX = CONFIG.lanes[currentLane];
        let gameActive = false;
        let currentSpeed = CONFIG.baseSpeed;
        let distanceTraveled = 0;
        let lastSpawnTime = 0;

        // --- INITIALIZATION ---
        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3c1ad); // Sky color matching your setup
            scene.fog = new THREE.FogExp2(0xa3c1ad, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Dynamic capping for performance
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            setupLighting();
            generateInfiniteTrackSystem();
            loadPlayerModel();
            setupInputHandlers();

            window.addEventListener('resize', onWindowResize);
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);
        }

        // --- ASSET INFRASTRUCTURE ---
        function loadPlayerModel() {
            const loader = new THREE.GLTFLoader();
            
            // Replace with your actual relative path (e.g., 'assets/scan.gltf')
            // Using a procedural placeholder container until your asset successfully resolves async
            const playerGroup = new THREE.Group();
            
            loader.load('path/to/your/model.gltf', 
                (gltf) => {
                    const model = gltf.scene;
                    
                    // Critical scale matching logic to prevent giant assets
                    model.scale.set(0.2, 0.2, 0.2); 
                    
                    // Position adaptation logic: center base geometry bounding box
                    model.position.set(0, 0, 0); 
                    
                    playerGroup.add(model);
                    finalizePlayerInit(playerGroup);
                },
                undefined,
                (error) => {
                    console.warn("GLTFLoader failed or asset path empty. Instantiating development geometry proxy.");
                    
                    // Visual proxy so the developer build never stalls out
                    const proxyGeo = new THREE.BoxGeometry(1, 1.8, 0.8);
                    const proxyMat = new THREE.MeshStandardMaterial({ color: 0x336699 });
                    const proxyMesh = new THREE.Mesh(proxyGeo, proxyMat);
                    proxyMesh.position.y = 0.9; // Sit on track floor
                    
                    playerGroup.add(proxyMesh);
                    finalizePlayerInit(playerGroup);
                }
            );
        }

        function finalizePlayerInit(playerGroup) {
            player = playerGroup;
            player.position.set(CONFIG.lanes[currentLane], 0, CONFIG.playerZ);
            scene.add(player);

            // Smoothly collapse loading matrix state
            document.getElementById('loading-screen').classList.add('hidden');
            gameActive = true;
            clock.getDelta(); // Clear initialization lag step from clock engine
        }

        function generateInfiniteTrackSystem() {
            // Generate consecutive track nodes to swap cleanly inside the game loop
            for (let i = 0; i < 3; i++) {
                createTrackSegment(-i * 100);
            }
        }

        function createTrackSegment(zPos) {
            const trackGroup = new THREE.Group();
            
            // Road Bed Plane
            const roadGeo = new THREE.PlaneGeometry(10, 100);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0xc2a69d, side: THREE.DoubleSide });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            trackGroup.add(road);

            // Procedural Lane Marking Striping
            const lineGeo = new THREE.PlaneGeometry(0.1, 100);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            
            const leftLine = new THREE.Mesh(lineGeo, lineMat);
            leftLine.position.set(-1.25, 0.01, 0);
            leftLine.rotation.x = -Math.PI / 2;
            trackGroup.add(leftLine);

            const rightLine = leftLine.clone();
            rightLine.position.x = 1.25;
            trackGroup.add(rightLine);

            trackGroup.position.z = zPos;
            scene.add(trackGroup);
            tracks.push(trackGroup);
        }

        // --- INPUT LAYER ---
        function setupInputHandlers() {
            // Keyboard Listener Engine
            window.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
                if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
            });

            // Mobile Touch Swipe Gesture Engine
            let touchStartX = 0;
            window.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                if (!gameActive) return;
                const touchEndX = e.changedTouches[0].screenX;
                const deltaX = touchEndX - touchStartX;
                
                if (deltaX < -50) moveLane(-1); // Swiped Left
                if (deltaX > 50) moveLane(1);   // Swiped Right
            }, { passive: true });

            // UI System Restart Handler
            document.getElementById('retry-btn').addEventListener('click', resetGameContext);
        }

        function moveLane(direction) {
            currentLane = Math.max(0, Math.min(2, currentLane + direction));
            targetX = CONFIG.lanes[currentLane];
        }

        // --- GAME LOOP ENGINE (PROMOTION 120HZ COMPLIANT) ---
        function animate() {
            requestAnimationFrame(animate);

            // Fetch actual duration delta between operations
            const delta = clock.getDelta();

            if (gameActive && player) {
                // Accelerate scaling engine dynamically based on progression milestone
                currentSpeed += CONFIG.speedIncrement * (delta * 0.1);
                distanceTraveled += currentSpeed * delta;
                document.getElementById('score-val').innerText = Math.floor(distanceTraveled);

                // 1. Precise Frame-Rate Independent Linear Interpolation for lane updates
                player.position.x = THREE.MathUtils.lerp(player.position.x, targetX, CONFIG.laneSpeed * delta);

                // 2. Continuous Track Recycling Mechanics
                tracks.forEach(track => {
                    track.position.z += currentSpeed * delta;
                    // If segment completely passes camera frame perspective, recycle to back of array line
                    if (track.position.z > 50) {
                        track.position.z -= 300;
                    }
                });

                // 3. Dynamic Obstacle Generation Logic Flow
                lastSpawnTime += delta;
                if (lastSpawnTime >= CONFIG.spawnInterval) {
                    spawnObstacleMatrix();
                    lastSpawnTime = 0;
                }

                // 4. Obstacle Lifetime Handling and Evaluation Vector Loop
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obstacle = obstacles[i];
                    obstacle.position.z += currentSpeed * delta;

                    // Execute local bounding box calculation metrics for clean collision tracking
                    if (obstacle.position.z > 2) {
                        scene.remove(obstacle);
                        obstacles.splice(i, 1);
                        continue;
                    }

                    // Strict Collision Frame Intersection Metrics Evaluation
                    const zDiff = Math.abs(obstacle.position.z - player.position.z);
                    const xDiff = Math.abs(obstacle.position.x - player.position.x);
                    
                    if (zDiff < 1.0 && xDiff < 1.2) {
                        triggerCrashSequence();
                    }
                }

                // 5. Polished Camera Offset Matrix - Floating Anchor Perspective
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, player.position.x * 0.7, 4 * delta);
                camera.position.y = 3.5;               // Altitude position vector looking down 
                camera.position.z = CONFIG.playerZ + 6.5; // Offset placement distance vector behind unit frame
                camera.lookAt(player.position.x, 1.2, CONFIG.playerZ - 3); // Dynamic tracking look-target focal vector
            }

            renderer.render(scene, camera);
        }

        // --- PROCEDURAL ENGINE ELEMENT SCENARIOS ---
        function spawnObstacleMatrix() {
            // Select random track execution lane vector assignment
            const randomLaneIndex = Math.floor(Math.random() * CONFIG.lanes.length);
            const xPos = CONFIG.lanes[randomLaneIndex];

            // Procedural geometry block construct
            const obsHeight = 1.2 + Math.random() * 0.8;
            const geo = new THREE.BoxGeometry(1.6, obsHeight, 1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a2a, 
                roughness: 0.2,
                metalness: 0.8
            });
            
            const obstacle = new THREE.Mesh(geo, mat);
            obstacle.position.set(xPos, obsHeight / 2, -200); // Spawns cleanly in the deep distance fog layer
            obstacle.castShadow = true;
            
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function triggerCrashSequence() {
            gameActive = false;
            document.getElementById('final-score').innerText = Math.floor(distanceTraveled);
            document.getElementById('crash-screen').classList.remove('hidden');
        }

        function resetGameContext() {
            // Purge and isolate old array element matrices from live memory execution trees
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            
            // Set track structures back inside their linear start locations
            for (let i = 0; i < tracks.length; i++) {
                tracks[i].position.z = -i * 100;
            }

            // Restore engine configurations
            currentLane = 1;
            targetX = CONFIG.lanes[currentLane];
            player.position.set(targetX, 0, CONFIG.playerZ);
            
            distanceTraveled = 0;
            currentSpeed = CONFIG.baseSpeed;
            lastSpawnTime = 0;
            
            document.getElementById('crash-screen').classList.add('hidden');
            gameActive = true;
            clock.getDelta(); // Purge UI runtime context shift latency steps from game clock loop
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- TRIGGER START ---
        init();
        animate();
    </script>
</body>
</html>
