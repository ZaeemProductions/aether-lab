<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Kim Slap Arena</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #05050a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        .hud-element {
            background: rgba(10, 10, 25, 0.85);
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            padding: 12px 25px;
            border-radius: 20px;
            color: #ffffff;
            backdrop-filter: blur(6px);
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #score-val { color: #ff007f; text-shadow: 0 0 8px #ff007f; }
        
        /* iPad Mobile Controls */
        #controls-layer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 15px;
        }
        .touch-zone { pointer-events: auto; }
        #joystick-bound {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        #joystick-thumb {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00ffff 0%, #0088cc 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffff;
        }
        #slap-btn {
            width: 105px;
            height: 105px;
            background: rgba(255, 0, 127, 0.2);
            border: 3px solid #ff007f;
            color: #ffffff;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            transform: scale(1);
            transition: transform 0.05s ease;
        }
        #slap-btn:active {
            background: #ff007f;
            transform: scale(0.92);
            box-shadow: 0 0 35px #ff007f;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #game-over-screen h1 {
            font-size: 3.5rem;
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 25px #00ffff;
        }
        .btn-restart {
            margin-top: 25px;
            padding: 15px 40px;
            background: #ff007f;
            border: none;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 20px #ff007f;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element">MR. KIM YEETS: <span id="score-val">0</span></div>
        </div>

        <div id="controls-layer">
            <div id="joystick-bound" class="touch-zone">
                <div id="joystick-thumb"></div>
            </div>
            <div id="slap-btn" class="touch-zone">SLAP!</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1>MR. KIM FELL OFF!</h1>
        <p>You were pushed off the edge of the floating matrix arena.</p>
        <p>Total Targeted Yeets: <span id="final-score">0</span></p>
        <button class="btn-restart" onclick="resetGame()">REBOOT ARENA</button>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let player, slapGlove;
        let enemies = [];
        let particles = [];
        
        let gameActive = true;
        let yeetCount = 0;
        
        const moveInput = new THREE.Vector2(0, 0);
        const islandRadius = 22;
        const playerSpeed = 16.0;

        let isSlapping = false;
        let slapTime = 0;
        const slapDuration = 0.2; 
        let slapCooldown = 0;

        let joystickActive = false;
        let joystickStart = new THREE.Vector2();
        const maxJoystickDist = 50;

        function init() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x030306);
            scene.fog = new THREE.FogExp2(0x030306, 0.02);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 18, 22);
            camera.lookAt(0, 0, -2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const skyLight = new THREE.DirectionalLight(0x00ffff, 0.9);
            skyLight.position.set(10, 30, 10);
            scene.add(skyLight);

            createCosmosBackground();
            buildSlapIsland();
            buildPlayerCharacter();
            setupControls();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createCosmosBackground() {
            const geo = new THREE.BufferGeometry();
            const count = 400;
            const positions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i+=3) {
                positions[i] = (Math.random() - 0.5) * 160;
                positions[i+1] = (Math.random() - 0.5) * 80 + 10;
                positions[i+2] = (Math.random() - 0.5) * 160;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ size: 0.2, color: 0x00ffff, transparent: true, opacity: 0.5 });
            scene.add(new THREE.Points(geo, mat));
        }

        function buildSlapIsland() {
            const islandGroup = new THREE.Group();
            
            const topGeo = new THREE.CylinderGeometry(islandRadius, islandRadius + 1, 2, 32);
            const topMat = new THREE.MeshStandardMaterial({ color: 0x0e1117, roughness: 0.4, metalness: 0.8 });
            const topPlatform = new THREE.Mesh(topGeo, topMat);
            topPlatform.position.y = -1;
            islandGroup.add(topPlatform);

            const ringGeo = new THREE.TorusGeometry(islandRadius, 0.15, 8, 48);
            ringGeo.rotateX(Math.PI / 2);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff });
            const neonRing = new THREE.Mesh(ringGeo, ringMat);
            neonRing.position.y = 0.02;
            islandGroup.add(neonRing);

            scene.add(islandGroup);
        }

        function buildPlayerCharacter() {
            player = new THREE.Group();
            player.position.set(0, 0, 0);
            scene.add(player);

            // Glowing Pink Neon Glove attached directly to Mr. Kim's right side frame
            slapGlove = new THREE.Group();
            const gloveBox = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff007f, emissive: 0xff007f, roughness: 0.1 })
            );
            gloveBox.position.set(1.2, 1.0, -0.8); 
            slapGlove.add(gloveBox);
            player.add(slapGlove);

            // Load the custom 3D model with your perfect scale configuration parameters
            const loader = new THREE.GLTFLoader();
            loader.load('./Meshy_AI_Cloudy_Sky_Portrait_0610185922_texture.glb', function(gltf) {
                const model = gltf.scene;
                model.scale.set(4.0, 4.0, 4.0); 
                model.position.set(0, 0.8, 0); 
                model.rotation.y = Math.PI; 
                player.add(model);
            }, undefined, function(e) {
                console.error("Path execution bypass error logs on GLTF configuration mapping.", e);
            });
        }

        function setupControls() {
            const bound = document.getElementById('joystick-bound');
            const thumb = document.getElementById('joystick-thumb');
            const slapBtn = document.getElementById('slap-btn');

            bound.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const rect = bound.getBoundingClientRect();
                joystickStart.set(rect.left + rect.width/2, rect.top + rect.height/2);
            }, {passive: true});

            window.addEventListener('touchmove', (e) => {
                if (!joystickActive) return;
                const touch = e.touches[0];
                let dir = new THREE.Vector2(touch.clientX - joystickStart.x, touch.clientY - joystickStart.y);
                const dist = dir.length();

                if (dist > maxJoystickDist) dir.normalize().multiplyScalar(maxJoystickDist);
                thumb.style.transform = `translate(${dir.x}px, ${dir.y}px)`;
                moveInput.set(dir.x / maxJoystickDist, -(dir.y / maxJoystickDist));
            }, {passive: false});

            window.addEventListener('touchend', () => {
                joystickActive = false;
                thumb.style.transform = 'translate(0px, 0px)';
                moveInput.set(0, 0);
            });

            slapBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                executeSlapAction();
            });
        }

        function executeSlapAction() {
            if (isSlapping || slapCooldown > 0 || !gameActive) return;
            isSlapping = true;
            slapTime = slapDuration;
            slapCooldown = 0.3; 
        }

        function spawnEnemy() {
            if (!gameActive || enemies.length > 9) return;

            const enemyGroup = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.7, 1.8, 12);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff007f, roughness: 0.5 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.9;
            enemyGroup.add(body);

            const headGeo = new THREE.SphereGeometry(0.45, 12, 12);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x003366 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.0;
            enemyGroup.add(head);

            const angle = Math.random() * Math.PI * 2;
            const dist = 6 + Math.random() * 11;
            enemyGroup.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);

            enemyGroup.userData = {
                velocity: new THREE.Vector3(0, 0, 0),
                isKnockedBack: false,
                speed: 5.0 + Math.random() * 3.5
            };

            scene.add(enemyGroup);
            enemies.push(enemyGroup);
        }

        function createShockwaveParticles(pos, colorHex) {
            const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const mat = new THREE.MeshBasicMaterial({ color: colorHex });
            for(let i=0; i<25; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.position.y += 1.0;
                p.userData = {
                    vel: new THREE.Vector3((Math.random() - 0.5) * 22, Math.random() * 9 + 3, (Math.random() - 0.5) * 22),
                    life: 0.85
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (gameActive) {
                if (slapCooldown > 0) slapCooldown -= delta;

                if (isSlapping) {
                    slapTime -= delta;
                    slapGlove.rotation.y += delta * 26; 
                    if (slapTime <= 0) {
                        isSlapping = false;
                        slapGlove.rotation.y = 0; 
                    }
                }

                if (player) {
                    const moveVec = new THREE.Vector3(moveInput.x, 0, -moveInput.y).multiplyScalar(playerSpeed * delta);
                    player.position.add(moveVec);

                    if (moveInput.lengthSq() > 0.01) {
                        player.rotation.y = Math.atan2(moveInput.x, -moveInput.y);
                    }

                    camera.position.set(player.position.x, player.position.y + 18, player.position.z + 22);
                    camera.lookAt(player.position.x, player.position.y, player.position.z - 2);

                    const playerDist = Math.sqrt(player.position.x**2 + player.position.z**2);
                    if (playerDist > islandRadius) {
                        player.position.y -= delta * 32; 
                        if (player.position.y < -12) triggerGameOver();
                    }
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];

                    if (enemy.userData.isKnockedBack) {
                        enemy.position.add(enemy.userData.velocity.clone().multiplyScalar(delta));
                        enemy.userData.velocity.multiplyScalar(Math.pow(0.08, delta)); 
                        
                        const distFromCenter = Math.sqrt(enemy.position.x**2 + enemy.position.z**2);
                        if (distFromCenter > islandRadius) {
                            enemy.position.y -= delta * 35;
                        }

                        if (enemy.position.y < -15) {
                            scene.remove(enemy);
                            enemies.splice(i, 1);
                            yeetCount++;
                            document.getElementById('score-val').innerText = yeetCount;
                            continue;
                        }
                    } else {
                        const dir = new THREE.Vector3().subVectors(player.position, enemy.position);
                        dir.y = 0;
                        dir.normalize();
                        enemy.position.add(dir.multiplyScalar(enemy.userData.speed * delta));
                        enemy.lookAt(player.position.x, enemy.position.y, player.position.z);

                        const distToPlayer = player.position.distanceTo(enemy.position);
                        if (distToPlayer < 3.2 && isSlapping) {
                            const lookDir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);
                            
                            enemy.userData.isKnockedBack = true;
                            enemy.userData.velocity.copy(lookDir).multiplyScalar(48.0); 
                            enemy.userData.velocity.y = 13.0; 

                            createShockwaveParticles(enemy.position, 0xff007f);
                        }
                        
                        if (distToPlayer < 1.4 && !isSlapping) {
                            const pushBackDir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
                            player.position.add(pushBackDir.multiplyScalar(1.5));
                        }
                    }
                }

                if (Math.random() < 0.04) spawnEnemy();
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel.clone().multiplyScalar(delta));
                p.userData.vel.y -= delta * 24.0; 
                p.userData.life -= delta;
                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function triggerGameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = yeetCount;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function resetGame() {
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            yeetCount = 0;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over-screen').style.display = 'none';
            if(player) {
                player.position.set(0, 0, 0);
                player.rotation.set(0, 0, 0);
            }
            clock.getDelta();
            gameActive = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
