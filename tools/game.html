<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Kim's Giga-Growth 2D Arena</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #060814;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Interactive Startup Overlay */
        #setup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #060814;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
        }
        .start-btn {
            margin-top: 25px;
            padding: 16px 45px;
            background: linear-gradient(135deg, #00ffcc 0%, #00aaff 100%);
            border: none;
            color: #060814;
            font-weight: 900;
            font-size: 1.3rem;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        .hud-element {
            background: rgba(10, 14, 28, 0.85);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            padding: 12px 25px;
            border-radius: 20px;
            color: #ffffff;
            backdrop-filter: blur(8px);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #stat-size { color: #ffaa00; text-shadow: 0 0 8px #ffaa00; }
        #stat-score { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
        
        /* iPad Controller Layers */
        #controls-layer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 15px;
        }
        .touch-zone { pointer-events: auto; }
        
        #joystick-bound {
            width: 130px;
            height: 130px;
            background: rgba(0, 255, 204, 0.02);
            border: 3px dashed rgba(0, 255, 204, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #joystick-thumb {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00ffcc 0%, #0088aa 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffcc;
        }
        
        #ability-btn {
            width: 100px;
            height: 100px;
            background: rgba(255, 0, 127, 0.15);
            border: 3px solid #ff007f;
            color: #ffffff;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            transition: opacity 0.2s;
        }
        #ability-btn:disabled {
            opacity: 0.35;
            box-shadow: none;
        }
        .cd-text {
            font-size: 0.75rem;
            color: #ff007f;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h1 style="font-size: 2.3rem; color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.3);">MR. KIM ARCADIA</h1>
        <p style="color: #6a7b95; margin-top: 8px;">100% Vector Canvas Engine Engine • Zero External Models Asset Dependent</p>
        <button class="start-btn" onclick="initSystemInterface()">LAUNCH SYSTEM</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element">MR. KIM SCALE: <span id="stat-size">1.0x</span></div>
            <div class="hud-element">ABSORBED BOTS: <span id="stat-score">0</span></div>
        </div>

        <div id="controls-layer">
            <div id="joystick-bound" class="touch-zone">
                <div id="joystick-thumb"></div>
            </div>
            <button id="ability-btn" class="touch-zone" onclick="triggerTwinAbility()">
                <span>TWIN</span>
                <div id="cd-timer" class="cd-text">READY</div>
            </button>
        </div>
    </div>

    <script>
        // --- CHIPTUNE AUDIO PROCEDURAL ENGINE ---
        class GameAudioContext {
            constructor() { this.ctx = null; this.loop = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.startBGMTrack();
            }
            playPop() {
                if(!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
            playTwin() {
                if(!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, this.ctx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.35);
            }
            startBGMTrack() {
                const mel = [130, 147, 165, 147, 196, 165, 220, 196]; let i = 0;
                this.loop = setInterval(() => {
                    if(!this.ctx) return;
                    let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(mel[i], this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.35);
                    i = (i + 1) % mel.length;
                }, 350);
            }
        }

        const audio = new GameAudioContext();

        function initSystemInterface() {
            document.getElementById('setup-overlay').style.display = 'none';
            audio.init();
            setupGameEngine();
        }

        // --- 2D CANVAS GAME ENGINE MATRIX ---
        let canvas, ctx;
        let lastTime = performance.now();
        
        // Boundaries mapping
        const worldSize = 1400; 
        
        // Entity containers
        let player = { x: 0, y: 0, radius: 24, heading: 0, speed: 280 };
        let twin = null;
        let dummies = [];
        let particles = [];
        
        // Gameplay tracking systems
        let score = 0;
        let sizeMultiplier = 1.0;
        let targetViewportScale = 1.0;
        let currentViewportScale = 1.0;

        let twinActive = false;
        let twinTimer = 0;
        let twinCooldown = 0;
        const maxCooldown = 10.0;

        // Joystick indicators
        let moveInput = new THREE.Vector2(0, 0); // Reusing vector file wrapper for basic indexing math
        if (typeof THREE === 'undefined') {
            // Precision fallback struct wrapper if cdn header parses slow
            window.THREE = { Vector2: class { constructor(x,y){this.x=x;this.y=y;} set(x,y){this.x=x;this.y=y;} lengthSq(){return this.x*this.x+this.y*this.y;} normalize(){let l=Math.sqrt(this.x*this.x+this.y*this.y);if(l>0){this.x/=l;this.y/=l;}return this;} } };
        }
        
        let joyActive = false;
        let joyStart = new THREE.Vector2(0,0);
        const maxJoyDist = 50;

        function setupGameEngine() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();

            window.addEventListener('resize', resizeCanvas);
            setupTouchListeners();

            // Populate active arena dummies fields
            for(let i=0; i<35; i++) spawnDummyRobot(true);

            // Trigger primary animation loop iteration
            requestAnimationFrame(gameLoopUpdate);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnDummyRobot(scatterRandomly = false) {
            let size = 10 + Math.random() * 22;
            let rx, ry;
            
            if (scatterRandomly) {
                rx = (Math.random() - 0.5) * (worldSize - 100);
                ry = (Math.random() - 0.5) * (worldSize - 100);
            } else {
                // Spawn way out of frame view circles
                let angle = Math.random() * Math.PI * 2;
                rx = player.x + Math.cos(angle) * (canvas.width / currentViewportScale);
                ry = player.y + Math.sin(angle) * (canvas.height / currentViewportScale);
                // Clamp checks
                rx = Math.max(-worldSize/2 + 50, Math.min(worldSize/2 - 50, rx));
                ry = Math.max(-worldSize/2 + 50, Math.min(worldSize/2 - 50, ry));
            }

            dummies.push({
                x: rx,
                y: ry,
                radius: size,
                color: `hsl(${Math.random() * 360}, 95%, 65%)`,
                angle: Math.random() * Math.PI * 2,
                pulseSeed: Math.random() * 10
            });
        }

        function triggerTwinAbility() {
            if (twinCooldown > 0 || twinActive) return;
            audio.playTwinSound();
            twinActive = true;
            twinTimer = 5.0; // Spawns for 5 seconds
            
            twin = {
                x: player.x + Math.cos(player.heading) * 60,
                y: player.y + Math.sin(player.heading) * 60,
                radius: player.radius * 0.8
            };
            createSparks(twin.x, twin.y, '#00ffff', 25);
        }

        function createSparks(x, y, color, count) {
            for(let i=0; i<count; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = 50 + Math.random() * 200;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    life: 1.0,
                    decay: 1.5 + Math.random() * 2,
                    color: color
                });
            }
        }

        // --- HARDWARE FLUID LOOP PROCESSING (dt BIND) ---
        function gameLoopUpdate(now) {
            requestAnimationFrame(gameLoopUpdate);

            // Compute exact delta scale mapping windows to bypass 120Hz monitor multiplier glitches
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1) dt = 0.1; // Limit spike thresholds

            updateLogicEngine(dt);
            renderGraphicsEngine();
        }

        function updateLogicEngine(dt) {
            // 1. Cooldown timers
            if (twinCooldown > 0) {
                twinCooldown -= dt;
                if (twinCooldown <= 0) {
                    document.getElementById('ability-btn').disabled = false;
                    document.getElementById('cd-timer').innerText = "READY";
                } else {
                    document.getElementById('ability-btn').disabled = true;
                    document.getElementById('cd-timer').innerText = twinCooldown.toFixed(1) + "s";
                }
            }

            // 2. Handle Shadow Twin Clone Automations
            if (twinActive && twin) {
                twinTimer -= dt;
                
                // Track nearest target item object
                let nearest = null, closestDist = Infinity;
                dummies.forEach(d => {
                    let dist = Math.hypot(d.x - twin.x, d.y - twin.y);
                    if (dist < closestDist) { closestDist = dist; nearest = d; }
                });

                if (nearest) {
                    let ang = Math.atan2(nearest.y - twin.y, nearest.x - twin.x);
                    twin.x += Math.cos(ang) * 450 * dt;
                    twin.y += Math.sin(ang) * 450 * dt;
                }

                if (twinTimer <= 0) {
                    createSparks(twin.x, twin.y, '#ff007f', 20);
                    twin = null;
                    twinActive = false;
                    twinCooldown = maxCooldown;
                }
            }

            // 3. Move Player Avatar Coordinates
            if (moveInput.lengthSq() > 0.01) {
                let currentSpeed = player.speed * (1 + (sizeMultiplier - 1) * 0.15);
                player.x += moveInput.x * currentSpeed * dt;
                player.y -= moveInput.y * currentSpeed * dt; // Inverted grid orientation translation
                player.heading = Math.atan2(-moveInput.y, moveInput.x);
            }

            // Ground boundary clamping parameters
            player.x = Math.max(-worldSize/2 + player.radius, Math.min(worldSize/2 - player.radius, player.x));
            player.y = Math.max(-worldSize/2 + player.radius, Math.min(worldSize/2 - player.radius, player.y));

            // 4. Update Dummies Flee Routing & Collision Checks
            for (let i = dummies.length - 1; i >= 0; i--) {
                const d = dummies[i];
                
                let distToPlayer = Math.hypot(player.x - d.x, player.y - d.y);
                let distToTwin = twin ? Math.hypot(twin.x - d.x, twin.y - d.y) : Infinity;
                
                let threatDist = Math.min(distToPlayer, distToTwin);
                let threatSource = distToPlayer < distToTwin ? player : twin;

                // Flee Logic
                if (threatDist < player.radius * 4.0) {
                    let fleeAngle = Math.atan2(d.y - threatSource.y, d.x - threatSource.x);
                    d.x += Math.cos(fleeAngle) * 260 * dt;
                    d.y += Math.sin(fleeAngle) * 260 * dt;
                    d.angle = fleeAngle;
                    
                    // Boundary bouncing lines inside map limits
                    d.x = Math.max(-worldSize/2 + d.radius, Math.min(worldSize/2 - d.radius, d.x));
                    d.y = Math.max(-worldSize/2 + d.radius, Math.min(worldSize/2 - d.radius, d.y));
                }

                // Consumption Intersect Processing (Player eats dummy)
                if (distToPlayer < (player.radius + d.radius * 0.5)) {
                    audio.playPop();
                    createSparks(d.x, d.y, d.color, 15);
                    
                    // Increase metrics indices smoothly
                    score++;
                    let growthStep = d.radius * 0.35;
                    player.radius += growthStep;
                    sizeMultiplier = player.radius / 24.0;
                    targetViewportScale = 1 / (1 + (sizeMultiplier - 1) * 0.45); // Scale camera back dynamically

                    document.getElementById('stat-size').innerText = sizeMultiplier.toFixed(1) + "x";
                    document.getElementById('stat-score').innerText = score;

                    dummies.splice(i, 1);
                    spawnDummyRobot(false);
                    continue;
                }

                // Consumption Intersect Processing (Twin clone eats dummy)
                if (twin && distToTwin < (twin.radius + d.radius * 0.5)) {
                    audio.playPop();
                    createSparks(d.x, d.y, '#00ffff', 15);
                    
                    score++;
                    let growthStep = d.radius * 0.35;
                    player.radius += growthStep;
                    sizeMultiplier = player.radius / 24.0;
                    targetViewportScale = 1 / (1 + (sizeMultiplier - 1) * 0.45);

                    document.getElementById('stat-size').innerText = sizeMultiplier.toFixed(1) + "x";
                    document.getElementById('stat-score').innerText = score;

                    dummies.splice(i, 1);
                    spawnDummyRobot(false);
                }
            }

            // 5. Particle decay loop tracking
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= p.decay * dt;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Smoothly ease viewport scaling factor (Lerp)
            currentViewportScale += (targetViewportScale - currentViewportScale) * 4.0 * dt;
        }

        function renderGraphicsEngine() {
            // Clean view array matrix fields
            ctx.fillStyle = '#060814';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Center viewport on Mr. Kim's coordinates
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(currentViewportScale, currentViewportScale);
            ctx.translate(-player.x, -player.y);

            // 1. Draw Tech-Grid Playground Ground Plane
            ctx.strokeStyle = '#121930';
            ctx.lineWidth = 1.5;
            const gridSpacing = 60;
            
            let startX = -worldSize / 2;
            let endX = worldSize / 2;
            
            for (let x = startX; x <= endX; x += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(x, startX); ctx.lineTo(x, endX); ctx.stroke();
            }
            for (let y = startX; y <= endX; y += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
            }

            // Outer Boundary Glow Lines
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 6;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.strokeRect(-worldSize/2, -worldSize/2, worldSize, worldSize);
            ctx.shadowBlur = 0; // Clear performance costly shadow allocations instantly

            // 2. Draw Target Dummies Vector Sprites
            dummies.forEach(d => {
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle);

                let pulse = 1 + Math.sin(performance.now() * 0.008 + d.pulseSeed) * 0.08;

                // Cyber Torso representation box circle setup
                ctx.fillStyle = d.color;
                ctx.beginPath();
                ctx.arc(0, 0, d.radius * pulse, 0, Math.PI * 2);
                ctx.fill();

                // Front Glowing Visor line link indicator orientation mapping
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(d.radius * 0.3, -d.radius * 0.2, d.radius * 0.5, d.radius * 0.4);

                ctx.restore();
            });

            // 3. Draw Holographic Shadow Twin Clone Component
            if (twinActive && twin) {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ffff';
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 4]); // Wireframe tech style look fields

                ctx.beginPath();
                ctx.arc(twin.x, twin.y, twin.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // 4. Draw Particles Explosions
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            // 5. Procedurally Draw Mr. Kim Core Avatar
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.heading);

            // Glowing Outer Tech Shield Ring Indicator
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 3 + (sizeMultiplier * 0.5);
            ctx.shadowBlur = 15 + (sizeMultiplier * 2);
            ctx.shadowColor = '#ffaa00';
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Inner Vector Core Design representational identity layout block
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 0.75, 0, Math.PI * 2);
            ctx.fill();

            // Direction pointer lines mesh layout indicators
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(player.radius * 0.4, -player.radius * 0.25);
            ctx.lineTo(player.radius * 0.8, 0);
            ctx.lineTo(player.radius * 0.4, player.radius * 0.25);
            ctx.fill();

            ctx.restore();

            ctx.restore(); // Restore base transform viewport matrix stacks
        }

        // --- IPAD MOBILE CONTROLS EVENT HANDLERS ---
        function setupTouchListeners() {
            const bound = document.getElementById('joystick-bound');
            const thumb = document.getElementById('joystick-thumb');

            bound.addEventListener('touchstart', (e) => {
                joyActive = true;
                const rect = bound.getBoundingClientRect();
                joyStart.set(rect.left + rect.width/2, rect.top + rect.height/2);
            }, {passive: true});

            window.addEventListener('touchmove', (e) => {
                if (!joyActive) return;
                const touch = e.touches[0];
                let dir = new THREE.Vector2(touch.clientX - joyStart.x, touch.clientY - joyStart.y);
                const dist = dir.length();

                if (dist > maxJoyDist) dir.normalize().multiplyScalar(maxJoyDist);
                thumb.style.transform = `translate(${dir.x}px, ${dir.y}px)`;
                
                moveInput.set(dir.x / maxJoyDist, -(dir.y / maxJoyDist));
            }, {passive: false});

            window.addEventListener('touchend', () => {
                joyActive = false;
                thumb.style.transform = 'translate(0px, 0px)';
                moveInput.set(0, 0);
            });
        }
    </script>
</body>
</html>
