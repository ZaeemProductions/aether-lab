<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Lab // TG Command Core</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #09090b; color: #f4f4f5; font-family: monospace; overflow-x: hidden; }
    .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen p-4 sm:p-8 selection:bg-blue-500/30">

  <header class="max-w-5xl mx-auto flex justify-between items-end border-b border-zinc-800 pb-4 mb-8">
    <div>
      <h1 class="text-xl font-bold tracking-widest text-zinc-100 uppercase flex items-center gap-3">
        <i class="fa-brands fa-telegram text-blue-500 text-2xl"></i>
        Aether Lab <span class="text-zinc-600">//</span> TG_Core
      </h1>
      <p class="text-xs text-zinc-500 mt-1 uppercase tracking-wider">100% Client-Side Telegram API Bridge</p>
    </div>
    <div class="text-[10px] text-zinc-500 text-right">
      <span id="bot-status-indicator" class="text-zinc-600 font-bold uppercase"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Offline</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1 space-y-6">
      <div class="glass-panel p-5 rounded-xl space-y-4 shadow-lg">
        <div class="flex items-center gap-2 text-xs font-bold text-zinc-400 uppercase tracking-widest border-b border-zinc-800 pb-2">
          <i class="fa-solid fa-key text-blue-400"></i> API Handshake
        </div>
        <div class="space-y-2">
          <label class="text-[10px] text-zinc-500 uppercase tracking-wider">Bot Token</label>
          <input type="password" id="tg-token" value="8610031632:AAF9NwDwfgEokbz6cvg55jH7vFmL8_tEDvs" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-xs text-zinc-300 focus:outline-none focus:border-blue-500 transition font-mono" placeholder="HTTP API Token..." />
        </div>
        <button onclick="authenticateBot()" class="w-full bg-zinc-800 hover:bg-blue-600 hover:text-white text-zinc-300 border border-zinc-700 hover:border-blue-500 font-bold py-2 rounded-lg text-xs uppercase transition-all tracking-wider shadow-md">
          Verify Connection
        </button>
      </div>

      <div class="glass-panel p-5 rounded-xl space-y-4 shadow-lg relative overflow-hidden">
        <div id="tx-overlay" class="absolute inset-0 bg-zinc-950/80 backdrop-blur-[2px] z-10 flex items-center justify-center text-xs text-zinc-500 uppercase tracking-widest font-bold">
          <i class="fa-solid fa-lock mr-2"></i> Auth Required
        </div>
        <div class="flex items-center gap-2 text-xs font-bold text-zinc-400 uppercase tracking-widest border-b border-zinc-800 pb-2">
          <i class="fa-solid fa-satellite-dish text-emerald-400"></i> Transmission Deck
        </div>
        <div class="space-y-2">
          <label class="text-[10px] text-zinc-500 uppercase tracking-wider flex justify-between">
            Target Chat ID <span class="text-blue-500 cursor-pointer hover:underline" onclick="copyIdFromRadar()">(Get from Radar)</span>
          </label>
          <input type="text" id="tx-chat-id" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-xs text-zinc-300 focus:outline-none focus:border-emerald-500 transition font-mono" placeholder="e.g., 123456789" />
        </div>
        <div class="space-y-2">
          <label class="text-[10px] text-zinc-500 uppercase tracking-wider">Payload Data</label>
          <textarea id="tx-message" rows="4" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-xs text-zinc-300 focus:outline-none focus:border-emerald-500 transition font-mono resize-none" placeholder="Enter message payload..."></textarea>
        </div>
        <button onclick="transmitPayload()" class="w-full bg-emerald-900/30 hover:bg-emerald-600 text-emerald-400 hover:text-white border border-emerald-800/50 hover:border-emerald-500 font-bold py-2.5 rounded-lg text-xs uppercase transition-all tracking-widest shadow-md flex justify-center items-center gap-2">
          <i class="fa-solid fa-paper-plane"></i> Execute Send
        </button>
      </div>
    </div>

    <div class="lg:col-span-2 glass-panel rounded-xl flex flex-col shadow-lg overflow-hidden border border-zinc-800">
      <div class="bg-zinc-900 px-5 py-4 flex justify-between items-center border-b border-zinc-800 shrink-0">
        <div class="flex items-center gap-2 text-xs font-bold text-zinc-300 uppercase tracking-widest">
          <i class="fa-solid fa-radar text-purple-400"></i> Active Radar / Inbox
        </div>
        <button onclick="pollUpdates()" class="bg-zinc-800 hover:bg-purple-600 hover:text-white text-zinc-400 border border-zinc-700 font-bold px-3 py-1.5 rounded text-[10px] uppercase transition-all tracking-wider">
          <i class="fa-solid fa-rotate-right mr-1"></i> Scan Network
        </button>
      </div>
      <div id="radar-screen" class="flex-1 p-5 overflow-y-auto custom-scroll space-y-3 bg-zinc-950/50 min-h-[400px]">
        <div class="text-center py-12 text-zinc-600 text-xs uppercase tracking-widest font-bold">
          <i class="fa-solid fa-network-wired text-3xl block mb-3 text-zinc-800"></i>
          Awaiting API Connection...
        </div>
      </div>
    </div>
  </main>

  <script>
    let botToken = "";
    let lastCopiedId = "";

    async function authenticateBot() {
      const inputToken = document.getElementById('tg-token').value.trim();
      if (!inputToken) return alert("System Error: Token missing.");
      const indicator = document.getElementById('bot-status-indicator');
      const txOverlay = document.getElementById('tx-overlay');
      indicator.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin text-[8px] mr-1"></i>Connecting...`;
      
      try {
        const response = await fetch(`https://api.telegram.org/bot${inputToken}/getMe`);
        const data = await response.json();
        if (data.ok) {
          botToken = inputToken;
          indicator.innerHTML = `<span class="text-emerald-400"><i class="fa-solid fa-circle text-[8px] mr-1"></i>@${data.result.username} Online</span>`;
          txOverlay.style.display = "none";
          pollUpdates();
        } else {
          indicator.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation text-[8px] mr-1"></i>Auth Failed</span>`;
        }
      } catch (err) {
        indicator.innerHTML = `<span class="text-red-500">Network Error</span>`;
      }
    }

    async function pollUpdates() {
      if (!botToken) return;
      const screen = document.getElementById('radar-screen');
      try {
        const response = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20`);
        const data = await response.json();
        if (data.ok) {
          screen.innerHTML = "";
          if (data.result.length === 0) {
            screen.innerHTML = `<div class="text-center py-12 text-zinc-600 text-[10px] uppercase tracking-widest font-bold">No data detected in radar.</div>`;
            return;
          }
          data.result.reverse().forEach(item => {
            if (!item.message) return;
            const msg = item.message;
            const isCommand = msg.text && msg.text.startsWith('/');
            const div = document.createElement('div');
            div.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 flex flex-col gap-2 hover:border-zinc-600 transition";
            div.innerHTML = `
              <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
                <span class="text-[10px] text-zinc-400 font-bold tracking-wider uppercase flex items-center gap-2">
                  <i class="fa-solid fa-user text-zinc-600"></i> ${msg.from.first_name || 'Unknown'} 
                  <span class="text-zinc-600 lowercase bg-zinc-950 px-1.5 py-0.5 rounded border border-zinc-800">@${msg.from.username || 'none'}</span>
                </span>
                <button onclick="setTargetChat('${msg.chat.id}')" class="text-[9px] bg-blue-900/30 text-blue-400 border border-blue-800 hover:bg-blue-600 hover:text-white px-2 py-1 rounded tracking-widest uppercase transition">
                  Target ID: ${msg.chat.id}
                </button>
              </div>
              <div class="text-xs text-zinc-300 font-sans leading-relaxed ${isCommand ? 'text-purple-400 font-bold' : ''}">
                ${msg.text || '[Attachment Received]'}
              </div>
            `;
            screen.appendChild(div);
          });
        }
      } catch (err) {
        console.error("Radar sweep failed:", err);
      }
    }

    function setTargetChat(id) {
      document.getElementById('tx-chat-id').value = id;
      lastCopiedId = id;
      const input = document.getElementById('tx-chat-id');
      input.classList.add('bg-blue-900/30', 'border-blue-500');
      setTimeout(() => input.classList.remove('bg-blue-900/30', 'border-blue-500'), 500);
    }

    function copyIdFromRadar() {
      if(lastCopiedId) setTargetChat(lastCopiedId);
    }

    async function transmitPayload() {
      if (!botToken) return;
      const chatId = document.getElementById('tx-chat-id').value.trim();
      const text = document.getElementById('tx-message').value.trim();
      if (!chatId || !text) return alert("System Error: Target ID and Payload required.");
      
      try {
        const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'HTML' })
        });
        const data = await response.json();
        if (data.ok) {
          document.getElementById('tx-message').value = "";
          pollUpdates();
          const btn = document.querySelector('button[onclick="transmitPayload()"]');
          const originalHTML = btn.innerHTML;
          btn.innerHTML = `<i class="fa-solid fa-check"></i> Transmitted`;
          btn.classList.add('bg-emerald-600', 'text-white');
          setTimeout(() => { btn.innerHTML = originalHTML; btn.classList.remove('bg-emerald-600', 'text-white'); }, 1500);
        } else {
          alert(`Transmission Failed: ${data.description}`);
        }
      } catch (err) {
        alert("Critical API Error.");
      }
    }
  </script>
</body>
</html>
